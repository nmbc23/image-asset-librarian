<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Asset Librarian</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local Library</p>
          <h1>Image Asset Librarian</h1>
        </div>
        <div class="scan-status" id="scan-status">Loading index...</div>
      </header>

      <section class="metrics" aria-label="Library summary">
        <div>
          <span id="metric-assets">0</span>
          <small>Assets</small>
        </div>
        <div>
          <span id="metric-size">0 B</span>
          <small>Total size</small>
        </div>
        <div>
          <span id="metric-duplicates">0</span>
          <small>Duplicate groups</small>
        </div>
        <div>
          <span id="metric-reclaimable">0 B</span>
          <small>Reclaimable</small>
        </div>
      </section>

      <section class="toolbar" aria-label="Gallery filters">
        <label class="search-field">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="Name, folder, source, type">
        </label>
        <label>
          <span>Source</span>
          <select id="root-filter"></select>
        </label>
        <label>
          <span>Type</span>
          <select id="extension-filter"></select>
        </label>
        <label>
          <span>Orientation</span>
          <select id="orientation-filter">
            <option value="all">All orientations</option>
            <option value="landscape">Landscape</option>
            <option value="portrait">Portrait</option>
            <option value="square">Square</option>
            <option value="unknown">Unknown</option>
          </select>
        </label>
        <label>
          <span>Age</span>
          <select id="age-filter">
            <option value="all">Any age</option>
            <option value="7">Last 7 days</option>
            <option value="30">Last 30 days</option>
            <option value="90">Last 90 days</option>
          </select>
        </label>
        <label>
          <span>Sort</span>
          <select id="sort-select">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="largest">Largest</option>
            <option value="smallest">Smallest</option>
            <option value="name">Name</option>
          </select>
        </label>
        <label>
          <span>Mark</span>
          <select id="mark-filter">
            <option value="all">All marks</option>
            <option value="saved">Saved</option>
            <option value="review">Review queue</option>
            <option value="unmarked">Unmarked</option>
          </select>
        </label>
        <label class="toggle">
          <input id="duplicate-toggle" type="checkbox">
          <span>Duplicates only</span>
        </label>
        <button type="button" id="reset-filters" class="secondary-button">Reset</button>
      </section>

      <section class="workflow-panel" aria-label="Review workflow">
        <div class="workflow-stats">
          <span id="saved-count">0 saved</span>
          <span id="review-count">0 review</span>
          <span id="selected-count">0 selected</span>
        </div>
        <div class="workflow-actions">
          <button type="button" id="copy-selected-paths" class="secondary-button">Copy selected paths</button>
          <button type="button" id="clear-selection" class="secondary-button">Clear selection</button>
        </div>
      </section>

      <section class="breakdown-panel" aria-label="Library breakdown">
        <div>
          <div class="section-heading">
            <h2>Sources</h2>
            <span id="source-breakdown-count">0 sources</span>
          </div>
          <div id="source-breakdown" class="breakdown-list"></div>
        </div>
        <div>
          <div class="section-heading">
            <h2>Types</h2>
            <span id="type-breakdown-count">0 types</span>
          </div>
          <div id="type-breakdown" class="breakdown-list"></div>
        </div>
      </section>

      <section class="duplicates-panel" aria-label="Duplicate groups">
        <div class="section-heading">
          <h2>Duplicates</h2>
          <span id="duplicate-summary">0 groups</span>
        </div>
        <div id="duplicate-list" class="duplicate-list"></div>
      </section>

      <section class="gallery-section" aria-label="Image gallery">
        <div class="section-heading">
          <h2>Gallery</h2>
          <span id="result-count">0 assets</span>
        </div>
        <div id="filtered-summary" class="filtered-summary"></div>
        <div id="gallery" class="gallery"></div>
        <div id="empty-state" class="empty-state" hidden>No assets match the current filters.</div>
      </section>
    </main>

    <aside id="detail-drawer" class="detail-drawer" aria-hidden="true" aria-label="Asset details">
      <div class="drawer-scrim" data-close-details></div>
      <section class="drawer-panel">
        <header class="drawer-header">
          <div>
            <p class="eyebrow">Asset Details</p>
            <h2 id="drawer-title">Select an asset</h2>
          </div>
          <button type="button" class="icon-button" data-close-details aria-label="Close details">x</button>
        </header>
        <div id="drawer-content" class="drawer-content"></div>
      </section>
    </aside>

    <script type="module" src="/app.js"></script>
  </body>
</html>
