name: Feature request
description: Suggest a workflow, scanner improvement, or UI enhancement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Workflow problem
      description: What image-library workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scanner
        - Gallery UI
        - Duplicate detection
        - Similar visual grouping
        - Local descriptions or reviews
        - Metadata
        - AI-assisted workflow
        - Documentation
  - type: textarea
    id: clutter
    attributes:
      label: Does this reduce UI clutter?
      description: Explain whether this replaces, combines, or simplifies an existing workflow. If it adds a new control, why is it worth the extra surface area?
    validations:
      required: true
  - type: textarea
    id: local-ai-boundary
    attributes:
      label: Local rules or real AI?
      description: Should this be implemented with local metadata rules, or does it need an explicit opt-in AI/API integration?
  - type: textarea
    id: privacy
    attributes:
      label: Privacy or filesystem impact
      description: Does this touch local files, metadata, or network calls?
